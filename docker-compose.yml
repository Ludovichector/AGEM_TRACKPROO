version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: agem_trackpro_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agempassword}
      POSTGRES_DB: ${POSTGRES_DB:-agem_trackpro}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agem}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agem_trackpro_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
